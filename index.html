<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register & Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #container {
            display: flex;
            gap: 20px;
        }
        #form-container, #security-container {
            background-color: white;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            width: 300px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        #delete-account {
            background-color: #f44336;
        }
        #delete-account:hover {
            background-color: #e53935;
        }
        #message {
            color: red;
        }
        .section-title {
            font-weight: bold;
            margin-top: 20px;
        }
        #security-container p {
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="security-container">
            <p>Choose Answers So When You Choose To Delete Your Account Later You Would Answer These Questions.</p>
            <div class="section-title">Choose Answers</div>
            <input type="text" id="secretWord" placeholder="Secret Word" required>
            <input type="number" id="secretNumber" placeholder="Secret Number" required>
            <input type="text" id="secretLetter" placeholder="Secret Letter" maxlength="1" pattern="[A-Za-z]" title="Please enter a single letter" required>
        </div>

        <div id="form-container">
            <h2 id="form-title">Register</h2>
            <form id="auth-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Submit</button>
            </form>
            <button id="delete-account" style="display: none;">Delete Account</button>
            <p id="message"></p>
        </div>
    </div>

    <script>
        const formTitle = document.getElementById('form-title');
        const authForm = document.getElementById('auth-form');
        const deleteAccountBtn = document.getElementById('delete-account');
        const message = document.getElementById('message');

        function isUsernameValid(username) {
            return username.length >= 5;
        }

        function isPasswordValid(password) {
            const specialCharPattern = /[!@#$%^&*(),.?":{}|<>]/;
            const numberPattern = /\d/;
            return password.length >= 6 && specialCharPattern.test(password) && numberPattern.test(password);
        }

        function register(username, password, secretWord, secretNumber, secretLetter) {
            localStorage.setItem('username', username);
            localStorage.setItem('password', password);
            localStorage.setItem('secretWord', secretWord);
            localStorage.setItem('secretNumber', secretNumber);
            localStorage.setItem('secretLetter', secretLetter);
            message.style.color = 'green';
            message.textContent = 'Registration successful! Redirecting to homepage...';

            // Redirect to index.html after registration
            setTimeout(() => {
                window.location.href = 'inde1x.html';
            }, 2000); // 2-second delay for user to see the success message
        }

        function login(username, password) {
            const storedUsername = localStorage.getItem('username');
            const storedPassword = localStorage.getItem('password');

            if (username === storedUsername && password === storedPassword) {
                message.style.color = 'green';
                message.textContent = 'Login successful! Redirecting to homepage...';

                // Redirect to index.html after login
                setTimeout(() => {
                    window.location.href = 'inde1x.html';
                }, 2000); // 2-second delay for user to see the success message
            } else {
                message.style.color = 'red';
                message.textContent = 'Invalid login. Please try again.';
            }
        }

        function deleteAccount() {
            const secretWord = prompt("Enter your Secret Word:");
            const secretNumber = prompt("Enter your Secret Number:");
            const secretLetter = prompt("Enter your Secret Letter:");

            const storedSecretWord = localStorage.getItem('secretWord');
            const storedSecretNumber = localStorage.getItem('secretNumber');
            const storedSecretLetter = localStorage.getItem('secretLetter');

            if (secretWord === storedSecretWord && secretNumber === storedSecretNumber && secretLetter === storedSecretLetter) {
                localStorage.clear();
                message.style.color = 'green';
                message.textContent = 'Account deleted successfully. Please register again.';
                authForm.reset();
                setFormToRegister();
            } else {
                message.style.color = 'red';
                message.textContent = 'Incorrect answers. Account deletion failed.';
            }
        }

        function setFormToLogin() {
            formTitle.textContent = 'Login';
            authForm.removeEventListener('submit', handleRegister);
            authForm.addEventListener('submit', handleLogin);
            deleteAccountBtn.style.display = 'block';
        }

        function setFormToRegister() {
            formTitle.textContent = 'Register';
            authForm.removeEventListener('submit', handleLogin);
            authForm.addEventListener('submit', handleRegister);
            deleteAccountBtn.style.display = 'none';
        }

        function handleRegister(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const secretWord = document.getElementById('secretWord').value;
            const secretNumber = document.getElementById('secretNumber').value;
            const secretLetter = document.getElementById('secretLetter').value;

            if (!isUsernameValid(username)) {
                message.style.color = 'red';
                message.textContent = 'Username must be at least 5 characters long.';
                return;
            }

            if (!isPasswordValid(password)) {
                message.style.color = 'red';
                message.textContent = 'Password must be at least 6 characters long, contain a special character, and a number.';
                return;
            }

            register(username, password, secretWord, secretNumber, secretLetter);
        }

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            login(username, password);
        }

        deleteAccountBtn.addEventListener('click', deleteAccount);

        // Show registration form initially
        setFormToRegister();
    </script>
</body>
</html>
